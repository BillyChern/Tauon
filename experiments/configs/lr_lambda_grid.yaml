# Learning rate x Lambda grid search
sweep_name: lr_lambda_grid
benchmark: cifar10
target_metric: accuracy
target_value: 94.0

base_config:
  momentum: 0.95
  ns_iters: 5
  epochs: 10
  batch_size: 512
  warmup_epochs: 0.5
  lr_schedule: cosine
  mixed_precision: true

sweep:
  lr:
    type: grid
    values: [0.01, 0.02, 0.04]
  lambda_reg:
    type: grid
    values: [0.01, 0.1, 1.0]

seeds: [42, 123, 456]
max_parallel: 1

output_dir: experiments/results/lr_lambda_grid
